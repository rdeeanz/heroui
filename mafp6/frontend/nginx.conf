# Konfigurasi Nginx: menyajikan SPA React + mem-proxy /api ke backend.
server {
  listen 80;                       # Dengarkan port 80.
  server_name _;                   # Terima semua host.

  root /usr/share/nginx/html;      # Lokasi file build frontend.
  index index.html;                # File awal.

  # Teruskan permintaan /api ke service backend (nama "backend" dari docker-compose).
  location /api/ {
    proxy_pass http://backend:3000;          # Alamat internal backend.
    proxy_set_header Host $host;             # Teruskan header Host.
    proxy_set_header X-Real-IP $remote_addr; # IP asli klien.
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: semua rute lain diarahkan ke index.html (routing sisi klien).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
